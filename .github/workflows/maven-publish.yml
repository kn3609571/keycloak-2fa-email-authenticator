# Publishes artifacts to Maven Central + GitHub Packages, attaches JARs to GitHub Releases.
# Triggered on every GitHub Release (type: released).
# Requires secrets: CENTRAL_TOKEN_USERNAME, CENTRAL_TOKEN_PASSWORD,
#                   GPG_SIGNING_KEY, GPG_SIGNING_KEY_PASSWORD

name: Maven Package

on:
  release:
    types: [released]

jobs:
  kc-version-matrix:
    name: Get last 10 Keycloak versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS=$( curl -L -s https://api.github.com/repos/keycloak/keycloak/releases \
            | jq -c '[.[] | select(.prerelease == false and .draft == false)] | sort_by(.name)[-10:] | [ .[] | .version=.name | {version}]' )
          echo "matrix={\"include\":$VERSIONS}" >> $GITHUB_OUTPUT

  build:
    needs: kc-version-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.kc-version-matrix.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Add GitHub Packages server to Maven settings
        run: |
          sed -i 's|</servers>|<server><id>github</id><username>${env.GITHUB_ACTOR}</username><password>${env.GITHUB_TOKEN}</password></server></servers>|' ~/.m2/settings.xml
      - name: Set version corresponding to Keycloak version
        run: mvn versions:set -DnewVersion=$(git describe --tags | sed 's/^v//')-KC${{ matrix.version }}
      - name: Build and publish to Maven Central
        run: |
          output=$(mvn -Dkeycloak.version=${{ matrix.version }} -B deploy --file pom.xml -P release --batch-mode 2>&1)
          mvn_exit=$?
          echo "$output"
          if echo "$output" | grep -q "already exists"; then
            echo "Version already exists on Maven Central — skipping."
            exit 0
          fi
          exit $mvn_exit
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
      - name: Publish to GitHub Packages
        run: mvn deploy -P github -DskipTests -Dgpg.skip=true --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attach artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/keycloak-2fa-email-authenticator*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
